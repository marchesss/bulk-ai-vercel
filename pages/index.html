<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BULK AI Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/bulk-logo.png" alt="BULK Logo" class="logo">
      <h1>BULK AI Assistant</h1>
    </div>

    <div class="character-container">
      <img id="character" src="/sprites/neutral.png" alt="Character">
    </div>

    <div class="chat-container">
      <div id="chat-box" class="chat-box"></div>
      <div class="input-container">
        <input type="text" id="user-input" placeholder="Задайте вопрос...">
        <button id="send-btn">Отправить</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
